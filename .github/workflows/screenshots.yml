name: Screenshots

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  capture:
    name: Capture UI screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack and wait for all services to be healthy
        run: docker compose up --build --wait

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Capture screenshots
        run: node .github/scripts/take-screenshots.mjs

      - name: Create pull request with fresh screenshots
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: refresh UI screenshots"
          branch: chore/refresh-screenshots
          delete-branch: true
          title: "docs: refresh README screenshots"
          body: |
            Automated screenshot refresh triggered by commit ${{ github.sha }}.

            Updated views:
            - `client-app` — exchange kiosk
            - `admin-app` — login, dashboard, till, transactions
          add-paths: |
            docs/screenshots/
